<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RupeeX Cash | Future of Yield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .gradient-text { background: linear-gradient(90deg, #facc15, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-input { width: 100%; background-color: #1a1e2e; border: 1px solid #374151; padding: 1rem; border-radius: 0.75rem; margin-bottom: 0.75rem; color: white; font-size: 0.875rem;}
        .form-input:focus { border-color: #facc15; outline: none; }
        #qr-container img { max-width: 100%; height: auto; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-200 font-sans">

    <nav class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#0b0f1a]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <span class="text-2xl font-black italic text-yellow-500">RupeeX</span>
        </div>
        <div class="hidden md:flex space-x-6 text-sm font-bold uppercase tracking-widest">
            <a href="#about" class="hover:text-yellow-500 transition">What is RupeeX</a>
            <a href="#why" class="hover:text-yellow-500 transition">Why Choose Us</a>
            <a href="#deposit-section" class="hover:text-yellow-500 transition">Deposit</a>
        </div>
        <button class="bg-yellow-500 text-black px-5 py-2 rounded-full font-bold text-xs">JOIN NOW</button>
    </nav>

    <section id="deposit-section" class="py-12 px-5 bg-gray-900/30">
        <div class="max-w-xl mx-auto bg-gray-900 border border-gray-700 p-8 rounded-3xl shadow-2xl space-y-6">
            <h3 class="text-2xl font-black text-center gradient-text">Secure Deposit USDT</h3>
            
            <p class="text-sm text-gray-400 text-center">Select your preferred network, scan to pay, and submit your transaction hash to activate ROI.</p>

            <div>
                <label class="block text-xs text-gray-500 mb-2 ml-1 font-bold uppercase tracking-wider">Select Network</label>
                <select id="network-selector" class="w-full bg-gray-800 border border-gray-600 p-4 rounded-xl text-sm font-bold text-white focus:border-yellow-500 focus:outline-none">
                    <option value="BEP20" selected>USDT (BEP20 - Binance Smart Chain)</option>
                    <option value="ERC20">USDT (ERC20 - Ethereum)</option>
                    <option value="TRC20">USDT (TRC20 - TRON Network)</option>
                </select>
            </div>

            <div id="payment-area" class="bg-gray-800/50 p-6 rounded-2xl border border-gray-700 space-y-4">
                <div class="bg-white p-4 rounded-xl mx-auto w-48 h-48 flex items-center justify-center shadow-lg border border-gray-600">
                    <img id="qr-image-bep20" src="bep20.png" alt="BEP20 QR" class="">
                    <img id="qr-image-erc20" src="erc20.png" alt="ERC20 QR" class="hidden">
                    <img id="qr-image-trc20" src="trc20.png" alt="TRC20 QR" class="hidden">
                </div>
                
                <div class="text-center">
                    <p class="text-xs text-gray-500 mb-1">Send funds to the address below:</p>
                    <p id="target-address" class="text-sm font-mono text-yellow-500 break-all bg-gray-900 p-3 rounded-md font-bold"></p>
                    <button onclick="copyCurrentAddress()" class="mt-3 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold py-2 px-4 rounded-full transition active:scale-95 shadow">Copy Address</button>
                </div>
            </div>

            <form name="hash-submission" method="POST" data-netlify="true" class="space-y-3">
                <input type="hidden" name="form-name" value="hash-submission" />
                <input type="hidden" name="selected-network" id="hidden-network" value="BEP20" />
                
                <div>
                    <label class="block text-xs text-gray-500 mb-2 ml-1 font-bold uppercase tracking-wider">Submit Payment Confirmation</label>
                    <input type="text" name="transaction-hash" id="tx-hash" placeholder="Paste your Transaction Hash (Tx Hash) here" class="form-input" required>
                </div>

                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-black font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95 text-sm uppercase tracking-wider mt-2">Submit Hash</button>
            </form>
            <p class="text-[10px] text-gray-500 mt-2 text-center">ROI activation takes 1-6 hours after verification. Ensure your hash is correct.</p>
        </div>
    </section>

    <script>
        // WALLET ADDRESSES
        const walletAddresses = {
            BEP20: "0xaAFe190F3EbF532377bA3De1Cb9eE5F58c118902",
            ERC20: "0xaAFe190F3EbF532377bA3De1Cb9eE5F58c118902",
            TRC20: "TWDLTo8rZ2eDpBx4yDC35Vdd4MQu414hNE"
        };

        const networkSelector = document.getElementById('network-selector');
        const addressDisplay = document.getElementById('target-address');
        const hiddenNetworkInput = document.getElementById('hidden-network');
        
        // QR Images
        const qrBep20 = document.getElementById('qr-image-bep20');
        const qrErc20 = document.getElementById('qr-image-erc20');
        const qrTrc20 = document.getElementById('qr-image-trc20');

        function updatePaymentInfo() {
            const selectedNetwork = networkSelector.value;
            const address = walletAddresses[selectedNetwork];
            
            // Update address text
            addressDisplay.innerText = address;
            
            // Update hidden input for form submission
            hiddenNetworkInput.value = selectedNetwork;

            // Hide all QRs, then show the correct one
            qrBep20.classList.add('hidden');
            qrErc20.classList.add('hidden');
            qrTrc20.classList.add('hidden');

            if (selectedNetwork === 'BEP20') qrBep20.classList.remove('hidden');
            else if (selectedNetwork === 'ERC20') qrErc20.classList.remove('hidden');
            else if (selectedNetwork === 'TRC20') qrTrc20.classList.remove('hidden');
        }

        // Initialize with default selected network (BEP20)
        updatePaymentInfo();

        // Add event listener for network change
        networkSelector.addEventListener('change', updatePaymentInfo);

        function copyCurrentAddress() {
            const selectedNetwork = networkSelector.value;
            const address = walletAddresses[selectedNetwork];
            navigator.clipboard.writeText(address).then(() => {
                alert(`Official ${selectedNetwork} Address Copied!\nSend USDT and paste your Tx Hash below.`);
            });
        }
    </script>
</body>
</html>
