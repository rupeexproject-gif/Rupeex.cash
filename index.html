<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RupeeX Cash | Daily 2% Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideIn 0.5s ease-out; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900 sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-yellow-500 text-black font-bold p-1 rounded text-sm">RX</div>
            <h1 class="text-xl font-extrabold tracking-tighter italic">RUPEEX CASH</h1>
        </div>
        <button id="connectBtn" class="bg-yellow-500 hover:bg-yellow-600 text-black text-xs font-bold py-2 px-4 rounded-full transition-all shadow-lg">Connect Wallet</button>
    </nav>

    <main class="max-w-md mx-auto mt-8 p-4">
        <div class="bg-gradient-to-b from-gray-800 to-gray-900 p-6 rounded-3xl border border-gray-700 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-bold">Daily <span class="text-green-400">2%</span> Profit</h2>
                    <p class="text-gray-400 text-sm">Automated Crypto Earnings</p>
                </div>
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" width="40" alt="USDT">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <p class="text-xs text-gray-400 uppercase">Min Invest</p>
                    <p class="text-lg font-bold text-yellow-500">$250 USDT</p>
                </div>
                <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <p class="text-xs text-gray-400 uppercase">Lock Period</p>
                    <p class="text-lg font-bold text-yellow-500">10 Days</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1 ml-1 font-bold">SELECT NETWORK</label>
                    <select id="network" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 focus:outline-none focus:border-yellow-500 text-sm">
                        <option value="BEP20">USDT (BEP20 - Binance Smart Chain)</option>
                        <option value="ERC20">USDT (ERC20 - Ethereum)</option>
                        <option value="TRC20">USDT (TRC20 - TRON Network)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-500 mb-1 ml-1 font-bold">INVEST AMOUNT (USDT)</label>
                    <input type="number" id="amount" value="250" min="250" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 focus:outline-none focus:border-yellow-500 text-xl font-mono">
                </div>

                <button id="investBtn" class="w-full bg-green-500 hover:bg-green-600 text-black py-4 rounded-xl text-lg font-black uppercase tracking-widest shadow-[0_0_20px_rgba(34,197,94,0.4)] transition-all">
                    Deposit Now
                </button>
            </div>

            <p class="mt-4 text-[10px] text-gray-500 text-center uppercase tracking-tighter">
                Secure SSL Encrypted • Smart Contract Verified • High Yield Plan
            </p>
        </div>
    </main>

    <div id="hypePopup" class="fixed bottom-5 left-5 right-5 md:right-auto md:w-80 hidden z-[9999]">
        <div class="bg-white text-black p-4 rounded-2xl shadow-2xl flex items-center space-x-3 border-l-8 border-green-500 animate-slide">
            <div class="bg-green-100 p-2 rounded-full">⚡</div>
            <div>
                <p id="hypeText" class="text-xs font-bold"></p>
                <p class="text-[10px] text-gray-500 font-bold italic">Tx Hash: 0x82...a9f</p>
            </div>
        </div>
    </div>

    <script>
        // WALLET ADDRESSES
        const wallets = {
            BEP20: "0xaAFe190F3EbF532377bA3De1Cb9eE5F58c118902",
            ERC20: "0xaAFe190F3EbF532377bA3De1Cb9eE5F58c118902",
            TRC20: "TWDLTo8rZ2eDpBx4yDC35Vdd4MQu414hNE"
        };

        // HYPE POPUP LOGIC
        function showHype() {
            const popup = document.getElementById('hypePopup');
            const text = document.getElementById('hypeText');
            const randomAddr = "0x" + Math.random().toString(16).slice(2, 6) + "..." + Math.random().toString(16).slice(2, 6);
            const amounts = [250, 500, 1000, 1250, 300, 750];
            const amount = amounts[Math.floor(Math.random() * amounts.length)];

            text.innerHTML = `Account <span class="text-blue-600">${randomAddr}</span> just deposited <span class="text-green-600">$${amount}</span>`;
            popup.classList.remove('hidden');
            
            setTimeout(() => {
                popup.classList.add('hidden');
            }, 5000);
        }

        // Trigger every 30 minutes (1800000ms)
        setInterval(showHype, 1800000);
        // Instant trigger for demo after 5 sec
        setTimeout(showHype, 5000);

        // DEPOSIT ACTION
        document.getElementById('investBtn').onclick = function() {
            const amount = document.getElementById('amount').value;
            const network = document.getElementById('network').value;
            const targetWallet = wallets[network];

            if (amount < 250) {
                alert("Minimum deposit is $250");
                return;
            }

            // Copy address for manual payment
            navigator.clipboard.writeText(targetWallet).then(() => {
                alert(`IMPORTANT: Send $${amount} USDT to the following ${network} address:\n\n${targetWallet}\n\nAddress has been copied to clipboard! Your 10-day lock starts after confirmation.`);
            });
        };

        document.getElementById('connectBtn').onclick = () => alert("Metamask connecting... Please wait.");
    </script>
</body>
</html>
